<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Eligibility Questionnaire | 130 Kathleen Road</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .questionnaire-container {
            max-width: 600px;
            width: 100%;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo-small {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-dark);
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-title {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-dark);
        }
        .q-group {
            margin-bottom: 25px;
        }
        .q-label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        select, textarea, input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            font-family: inherit;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn-submit {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }
        .success-overlay {
            display: none;
            text-align: center;
        }
        .success-overlay.active {
            display: block;
        }
        .success-icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="questionnaire-container">
        <div class="glass-panel" id="formPanel">
            <a href="index.html" class="logo-small">130 KATHLEEN RD.</a>
            <h1 class="form-title">Purchase Eligibility</h1>
            
            <form id="eligibilityForm">
                <input type="hidden" id="userEmail" name="email">
                
                <div class="q-group">
                    <label class="q-label">Current Buyer Status</label>
                    <select name="status" required>
                        <option value="" disabled selected>Select your status</option>
                        <option value="first-time">First-time Buyer</option>
                        <option value="upsizing">Upsizing (have a property to sell)</option>
                        <option value="downsizing">Downsizing (have a property to sell)</option>
                        <option value="investor">Investor / Cash Buyer</option>
                    </select>
                </div>

                <div class="q-group">
                    <label class="q-label">Position of Sale</label>
                    <select name="position" required>
                        <option value="" disabled selected>Select your position</option>
                        <option value="no-chain">No chain (nothing to sell)</option>
                        <option value="under-offer">Property under offer</option>
                        <option value="on-market">Property on market</option>
                        <option value="not-on-market">Property not yet on market</option>
                        <option value="cash">Cash buyer</option>
                    </select>
                </div>

                <div class="q-group">
                    <label class="q-label">Do you have a Mortgage in Principle?</label>
                    <select name="mortgage" required>
                        <option value="" disabled selected>Select option</option>
                        <option value="yes">Yes, approved</option>
                        <option value="pending">In progress / Pending</option>
                        <option value="no">Not yet</option>
                        <option value="n/a">Not applicable (Cash)</option>
                    </select>
                </div>

                <div class="q-group">
                    <label class="q-label">Estimated Completion Timeline</label>
                    <select name="timeline" required>
                        <option value="" disabled selected>Select timeline</option>
                        <option value="immediate">Immediate / No chain</option>
                        <option value="1-3-months">1-3 Months</option>
                        <option value="3-6-months">3-6 Months</option>
                        <option value="unknown">Unknown</option>
                    </select>
                </div>

                <div class="q-group">
                    <label class="q-label">Additional Details</label>
                    <textarea name="details" rows="4" placeholder="Any additional information about your position..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Requirements</button>
            </form>
        </div>

        <div class="glass-panel success-overlay" id="successPanel">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Thank You!</h2>
            <p>Your eligibility questionnaire has been submitted. We will review your details and be in touch shortly to confirm your viewing at 130 Kathleen Road.</p>
            <br>
            <a href="index.html" class="btn-primary" style="display:inline-block; padding: 10px 20px;">Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            if (email) {
                document.getElementById('userEmail').value = email;
            }

            const form = document.getElementById('eligibilityForm');
            const formPanel = document.getElementById('formPanel');
            const successPanel = document.getElementById('successPanel');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                try {
                    const response = await fetch('/api/submit-questionnaire', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        formPanel.style.display = 'none';
                        successPanel.classList.add('active');
                    } else {
                        alert('Submission failed. Please try again.');
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Submit Requirements';
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Network error. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Requirements';
                }
            });
        });
    </script>
</body>
</html>
